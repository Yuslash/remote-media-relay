version: '3.8'

name: rmr-backend

services:
  redis:
    image: redis:7-alpine
    container_name: rmr-redis
    ports:
      - "6399:6379"
    volumes:
      - rmr_redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rmr-api
    command: sh -c "uvicorn api.main:app --host 0.0.0.0 --port $${BACKEND_PORT:-8765} --reload"
    ports:
      - "${BACKEND_PORT:-8765}:${BACKEND_PORT:-8765}"
    volumes:
      - .:/app
      - rmr_shared_storage:/app/storage
      - rmr_logs_data:/app/logs
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rmr-worker
    command: celery -A worker.main.celery_app worker -l info
    volumes:
      - .:/app
      - rmr_shared_storage:/app/storage
      - rmr_logs_data:/app/logs
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  rmr_redis_data:
  rmr_shared_storage:
  rmr_logs_data:
